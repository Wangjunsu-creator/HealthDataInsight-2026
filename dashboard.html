<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>医疗效能监测大屏</title>
</head>
<body class="fill-parent"
	dg-chart-auto-resize="true"
	dg-chart-options="{title:{show:false},legend:{top:0},grid:{top:25}}"
	dg-chart-theme="{color:'#F0F0F0',actualBackgroundColor:'#33179d'}">
<div class="head">
    <div class="title"><label>“健康中国”全景医疗效能动态监测大屏</label></div>
</div>
<div class="content">
	<div class="layout layout-left-top">
		<div class="panel border-all">
			<div class="title"><label>医疗资源投入趋势</label></div>
			<div class="chart" dg-chart-widget=""></div>
			<div class="border-foot"></div>
		</div>
	</div>
	<div class="layout layout-left-center">
		<div class="panel border-all">
			<div class="title"><label>慢病致死率监控</label></div>
			<div class="chart" dg-chart-widget=""></div>
			<div class="border-foot"></div>
		</div>
	</div>
	<div class="layout layout-left-bottom">
		<div class="panel border-all">
			<div class="title"><label>各省规模效率排名</label></div>
			<div class="chart" dg-chart-widget=""></div>
			<div class="border-foot"></div>
		</div>
	</div>
    
    <div class="layout layout-center-top">
		<div class="panel border-all">
			<div class="title"><label>全国医疗资源效能空间分布</label></div>
			<div class="chart" style="padding: 10px;">
                </div>
			<div class="border-foot"></div>
		</div>
	</div>
    
	<div class="layout layout-center-bottom">
		<div class="panel border-all">
			<div class="title"><label>纯技术效率动态演变</label></div>
			<div class="chart" dg-chart-widget=""></div>
			<div class="border-foot"></div>
		</div>
	</div>
	<div class="layout layout-right-top">
		<div class="panel border-all">
			<div class="title"><label>四大聚类群体多维特征</label></div>
			<div class="chart" dg-chart-widget=""></div>
			<div class="border-foot"></div>
		</div>
	</div>
	<div class="layout layout-right-center">
		<div class="panel border-all">
			<div class="title"><label>核心病床周转率</label></div>
			<div class="chart" dg-chart-widget=""></div>
			<div class="border-foot"></div>
		</div>
	</div>
	<div class="layout layout-right-bottom">
		<div class="panel border-all">
			<div class="title"><label>低效能区域预警</label></div>
			<div class="chart" dg-chart-widget=""></div>
			<div class="border-foot"></div>
		</div>
	</div>
</div>
</body>
</html>
