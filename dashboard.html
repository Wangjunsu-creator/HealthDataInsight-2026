<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>“健康中国”全景医疗效能动态监测大屏</title>
    <style>
        /* 隐藏网页默认滚动条，大屏录制更纯粹 */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        body {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* 增加全局样式，确保图片和地图在框内居中并自适应 */
        .chart {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .chart img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
        }

        /* 🌟 核心升级：大屏内部的下钻小按钮 */
        .drill-btn {
            float: right;
            font-size: 12px;
            color: #4fc3f7;
            text-decoration: none;
            border: 1px solid rgba(79, 195, 247, 0.5);
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(11, 28, 87, 0.5);
            transition: all 0.3s;
            margin-top: 2px;
            margin-right: 10px;
        }
        .drill-btn:hover {
            background: #4fc3f7;
            color: #0b1c57;
            box-shadow: 0 0 10px #4fc3f7;
        }

        /* 右上角返回主页按钮 */
        .home-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            color: #4fc3f7;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #4fc3f7;
            padding: 4px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .home-btn:hover {
            background: #4fc3f7;
            color: #0b1c57;
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.6);
        }
    </style>
</head>
<body class="fill-parent"
	dg-chart-auto-resize="true"
	dg-chart-options="{title:{show:false},legend:{top:0},grid:{top:25}}"
	dg-chart-theme="{color:'#F0F0F0',actualBackgroundColor:'#33179d'}">

<div class="head">
    <div class="title">
        <label>“健康中国”全景医疗效能动态监测大屏</label>
        <a href="index.html" class="home-btn">🏠 返回学术主页</a>
    </div>
</div>

<div class="content">
    <div class="layout layout-left-top">
		<div class="panel border-all">
			<div class="title">
                <label>医疗资源投入趋势 (WDI)</label>
                <a href="detail_1.html" class="drill-btn">⚡ 深度解析</a>
            </div>
			<div class="chart">
                <img src="images/picture1_achievement_foundation_final.png" alt="资源投入趋势">
            </div>
			<div class="border-foot"></div>
		</div>
	</div>

    <div class="layout layout-left-center">
		<div class="panel border-all">
			<div class="title">
                <label>核心慢性病致死率监控</label>
                <a href="detail_2.html" class="drill-btn">⚡ 深度解析</a>
            </div>
			<div class="chart">
                <img src="images/picture2_final.png" alt="慢病监控">
            </div>
			<div class="border-foot"></div>
		</div>
	</div>

    <div class="layout layout-left-bottom">
		<div class="panel border-all">
			<div class="title">
                <label>各省医疗资源演变全景</label>
                <a href="detail_3.html" class="drill-btn">⚡ 深度解析</a>
            </div>
			<div class="chart">
                <img src="images/medical_resource_heatmap.png" alt="资源演变热力图">
            </div>
			<div class="border-foot"></div>
		</div>
	</div>
    
    <div class="layout layout-center-top">
		<div class="panel border-all">
			<div class="title">
                <label>全国医疗资源效能空间分布 (2005-2024)</label>
                <a href="detail_4.html" class="drill-btn">⚡ 深度解析</a>
            </div>
			<div class="chart" style="padding: 0;">
                <iframe src="Chart3_Dynamic_Resource_Map.html" scrolling="no"></iframe>
            </div>
			<div class="border-foot"></div>
		</div>
	</div>
    
    <div class="layout layout-center-bottom">
		<div class="panel border-all">
			<div class="title">
                <label>各省指标数据时空覆盖度</label>
                <a href="detail_5.html" class="drill-btn">⚡ 深度解析</a>
            </div>
			<div class="chart">
                <img src="images/Data_Availability_Heatmap.png" alt="数据覆盖度">
            </div>
			<div class="border-foot"></div>
		</div>
	</div>

    <div class="layout layout-right-top">
		<div class="panel border-all">
			<div class="title">
                <label>四大聚类群体多维特征雷达</label>
                <a href="detail_6.html" class="drill-btn">⚡ 深度解析</a>
            </div>
			<div class="chart">
                <img src="images/Chart5_cluster_radar_colored.png" alt="聚类特征雷达图">
            </div>
			<div class="border-foot"></div>
		</div>
	</div>

    <div class="layout layout-right-center">
		<div class="panel border-all">
			<div class="title">
                <label>核心投入-产出相关性矩阵</label>
                <a href="detail_7.html" class="drill-btn">⚡ 深度解析</a>
            </div>
			<div class="chart">
                <img src="images/Pearson_Correlation_Matrix.png" alt="相关性矩阵">
            </div>
			<div class="border-foot"></div>
		</div>
	</div>

    <div class="layout layout-right-bottom">
		<div class="panel border-all">
			<div class="title">
                <label>各省效能特征聚类参考</label>
                <a href="detail_8.html" class="drill-btn">⚡ 深度解析</a>
            </div>
			<div class="chart">
                <img src="images/medical_resource_heatmap.png" alt="区域预警参考">
            </div>
			<div class="border-foot"></div>
		</div>
	</div>
</div>

</body>
</html>
